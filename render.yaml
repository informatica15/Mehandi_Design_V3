services:
  # 1. ML Service (Python + FastAPI)
  - type: web
    name: mehndi-ml-service
    env: python
    buildCommand: pip install -r ml-service/requirements.txt && python ml-service/train.py && python ml-service/convert_to_tflite.py
    startCommand: uvicorn ml-service.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGIN
        value: '*'
      - key: PYTHON_VERSION
        value: 3.11.8
    plan: free

  # 2. Node.js Backend API Gateway
  - type: web
    name: mehndi-backend
    env: node
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    envVars:
      - key: ALLOWED_ORIGIN
        value: '*'
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: mehndi-ml-service
          property: host
    plan: free

  # 3. React Frontend (Static Site)
  - type: web
    name: mehndi-frontend
    env: static
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mehndi-backend
          property: host
